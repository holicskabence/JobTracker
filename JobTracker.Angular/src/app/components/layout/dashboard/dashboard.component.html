<div class="page">

    <div class="panel">

        <app-sidebar [activeTab]="activeTab()" [collapsed]="sidebarCollapsed()" [mobileOpen]="sidebarMobileOpen()"
            [userName]="auth.currentUser()?.name ?? ''" [userEmail]="auth.currentUser()?.email ?? ''"
            [avatarUrl]="auth.avatarObjectUrl()"
            (toggleCollapsed)="sidebarCollapsed.set(!sidebarCollapsed())" (closeMobile)="sidebarMobileOpen.set(false)"
            (logout)="logout()" />

        <div class="content">
            <app-dashboard-header [activeTab]="activeTab()" [userName]="auth.currentUser()?.name ?? ''"
                (addJob)="openAddModal()" (openMobileMenu)="sidebarMobileOpen.set(true)" />

            <main class="content-body" [class.content-body--kanban]="activeTab() === 'jelentkezesek'"
                [class.content-body--table]="activeTab() === 'tablazat'">
                <router-outlet (activate)="onRouteActivate()" />
            </main>
        </div>

    </div>

    @if (modalOpen()) {
    <app-add-job-modal [editJob]="editingJob()" (close)="closeModal()" />
    }

</div>
