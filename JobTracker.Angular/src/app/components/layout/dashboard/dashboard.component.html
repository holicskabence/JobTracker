<div class="dashboard" [class.dashboard--collapsed]="collapsed()">

    <app-sidebar [activeTab]="activeTab()" [collapsed]="collapsed()" [mobileOpen]="mobileOpen()"
        [userName]="userName()" [userEmail]="userEmail()" (toggleCollapsed)="toggleCollapsed()"
        (closeMobile)="closeMobileMenu()" (logout)="logout()" />

    <div class="dashboard-main">
        <app-dashboard-header [activeTab]="activeTab()" [userName]="userName()" (addJob)="addJob()"
            (openMobileMenu)="openMobileMenu()" />

        <div class="dashboard-content">
            <router-outlet />
        </div>
    </div>

</div>

@if (store.modalOpen()) {
<app-add-job-modal [editJob]="store.editingJob()" (close)="store.closeModal()" />
}
