<header class="dh">

    <button class="header-hamburger" (click)="openMobileMenu.emit()" [attr.aria-label]="'header.openMenu' | translate">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
    </button>

    <h1 class="header-title">{{ pageTitle }}</h1>

    <div class="header-right">
        @if (showViewToggle) {
        <button class="header-view-toggle-button" (click)="viewService.toggle()"
            [title]="(viewService.view() === 'kanban' ? 'applicationsView.switchToTable' : 'applicationsView.switchToKanban') | translate"
            [attr.aria-label]="(viewService.view() === 'kanban' ? 'applicationsView.switchToTable' : 'applicationsView.switchToKanban') | translate">
            @if (viewService.view() === 'kanban') {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <line x1="3" y1="9" x2="21" y2="9" />
                <line x1="3" y1="15" x2="21" y2="15" />
                <line x1="9" y1="9" x2="9" y2="21" />
            </svg>
            } @else {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="7" width="20" height="14" rx="2" />
                <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
                <line x1="8" y1="12" x2="16" y2="12" />
            </svg>
            }
        </button>
        }
        <button class="header-add-button" (click)="addJob.emit()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            <span class="header-add-label">{{ 'header.addJob' | translate }}</span>
        </button>
    </div>

</header>
