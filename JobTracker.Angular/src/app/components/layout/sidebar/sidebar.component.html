@if (mobileOpen) {
<div class="sidebar-overlay" (click)="closeMobile.emit()"></div>
}

<nav class="sidebar" [class.sidebar--expanded]="!collapsed" [class.sidebar--open]="mobileOpen">

    <button class="sidebar-border-toggle" (click)="toggleCollapsed.emit()"
        [title]="collapsed ? 'Kibontás' : 'Összecsukás'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6" />
        </svg>
    </button>

    <div class="sidebar-brand">
        <div class="sidebar-logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <rect x="2" y="2" width="9" height="9" rx="2" opacity="0.85" />
                <rect x="13" y="2" width="9" height="9" rx="2" opacity="0.45" />
                <rect x="2" y="13" width="9" height="9" rx="2" opacity="0.45" />
                <rect x="13" y="13" width="9" height="9" rx="2" opacity="0.85" />
            </svg>
        </div>
        <span class="sidebar-name">JobTracker</span>

        <button class="sidebar-brand-close" (click)="closeMobile.emit()" title="Bezárás">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6" />
            </svg>
        </button>
    </div>

    <div class="sidebar-nav">

        <a class="sidebar-btn" routerLink="/dashboard/attekintes" routerLinkActive="sidebar-btn--active"
            (click)="closeMobile.emit()" title="Áttekintés">
            <span class="sidebar-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1" />
                    <rect x="14" y="3" width="7" height="7" rx="1" />
                    <rect x="3" y="14" width="7" height="7" rx="1" />
                    <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
            </span>
            <span class="sidebar-label">Áttekintés</span>
        </a>

        <a class="sidebar-btn" routerLink="/dashboard/jelentkezesek" routerLinkActive="sidebar-btn--active"
            (click)="closeMobile.emit()" title="Jelentkezések">
            <span class="sidebar-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="7" width="20" height="14" rx="2" />
                    <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
                    <line x1="8" y1="12" x2="16" y2="12" />
                </svg>
            </span>
            <span class="sidebar-label">Jelentkezések</span>
        </a>

        <a class="sidebar-btn" routerLink="/dashboard/tablazat" routerLinkActive="sidebar-btn--active"
            (click)="closeMobile.emit()" title="Táblázat">
            <span class="sidebar-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <line x1="3" y1="9" x2="21" y2="9" />
                    <line x1="3" y1="15" x2="21" y2="15" />
                    <line x1="9" y1="9" x2="9" y2="21" />
                </svg>
            </span>
            <span class="sidebar-label">Táblázat</span>
        </a>

        <a class="sidebar-btn" routerLink="/dashboard/esemenyek" routerLinkActive="sidebar-btn--active"
            (click)="closeMobile.emit()" title="Események & Teendők">
            <span class="sidebar-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
            </span>
            <span class="sidebar-label">Események</span>
        </a>

        <a class="sidebar-btn" routerLink="/dashboard/dokumentumok" routerLinkActive="sidebar-btn--active"
            (click)="closeMobile.emit()" title="Dokumentumok & Sablonok">
            <span class="sidebar-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="16" y1="13" x2="8" y2="13" />
                    <line x1="16" y1="17" x2="8" y2="17" />
                </svg>
            </span>
            <span class="sidebar-label">Dokumentumok</span>
        </a>

        <a class="sidebar-btn" routerLink="/dashboard/statisztika" routerLinkActive="sidebar-btn--active"
            (click)="closeMobile.emit()" title="Statisztika">
            <span class="sidebar-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10" />
                    <line x1="12" y1="20" x2="12" y2="4" />
                    <line x1="6" y1="20" x2="6" y2="14" />
                </svg>
            </span>
            <span class="sidebar-label">Statisztika</span>
        </a>

        <a class="sidebar-btn" routerLink="/dashboard/torzsadatok" routerLinkActive="sidebar-btn--active"
            (click)="closeMobile.emit()" title="Törzsadatok">
            <span class="sidebar-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <ellipse cx="12" cy="5" rx="9" ry="3" />
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" />
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
                </svg>
            </span>
            <span class="sidebar-label">Törzsadatok</span>
        </a>

        <a class="sidebar-btn" routerLink="/dashboard/gyakorlas" routerLinkActive="sidebar-btn--active"
            (click)="closeMobile.emit()" title="Gyakorlás">
            <span class="sidebar-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-1.7-4.27 2.5 2.5 0 0 1-1.7-3.27 3 3 0 0 1 .25-5.5A2.5 2.5 0 0 1 9.5 2Z"/>
                    <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 1.7-4.27 2.5 2.5 0 0 0 1.7-3.27 3 3 0 0 0-.25-5.5A2.5 2.5 0 0 0 14.5 2Z"/>
                </svg>
            </span>
            <span class="sidebar-label">Gyakorlás</span>
        </a>

        <a class="sidebar-btn" routerLink="/dashboard/profil" routerLinkActive="sidebar-btn--active"
            (click)="closeMobile.emit()" title="Profil">
            <span class="sidebar-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </span>
            <span class="sidebar-label">Profil</span>
        </a>

    </div>

    <div class="sidebar-footer">

        <div class="sidebar-user">
            <div class="sidebar-user-avatar">
                @if (avatarUrl) {
                <img class="sidebar-user-avatar-img" [src]="avatarUrl" alt="" />
                } @else {
                {{ userInitial }}
                }
            </div>
            <div class="sidebar-user-info">
                <span class="sidebar-user-name">{{ userName }}</span>
                <span class="sidebar-user-email">{{ userEmail }}</span>
            </div>
        </div>

        <button class="sidebar-btn sidebar-btn--logout" (click)="logout.emit()" title="Kijelentkezés">
            <span class="sidebar-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
            </span>
            <span class="sidebar-label">Kijelentkezés</span>
        </button>

    </div>

</nav>
