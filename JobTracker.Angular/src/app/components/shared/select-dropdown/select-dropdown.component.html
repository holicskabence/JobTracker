<button type="button" class="select-dropdown-trigger" [class.select-dropdown-trigger--open]="isOpen"
    (click)="toggle($event)">
    <span class="select-dropdown-value">{{ value || placeholder }}</span>
    <svg class="select-dropdown-chevron" [class.select-dropdown-chevron--open]="isOpen" width="14" height="14"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9" />
    </svg>
</button>

@if (isOpen) {
<div class="select-dropdown-panel" [style.top.px]="panelTop" [style.left.px]="panelLeft"
    [style.min-width.px]="panelWidth" (click)="$event.stopPropagation()">
    @for (opt of options; track opt) {
    <button type="button" class="select-dropdown-opt" [class.select-dropdown-opt--active]="opt === value"
        (click)="pick(opt, $event)">
        <span>{{ opt }}</span>
        @if (opt === value) {
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12" />
        </svg>
        }
    </button>
    }
</div>
}
