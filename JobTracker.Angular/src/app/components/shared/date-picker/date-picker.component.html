<div class="dp">

    <button type="button" class="date-picker-trigger" [class.date-picker-trigger--filled]="!!value"
        [class.date-picker-trigger--error]="hasError" [class.date-picker-trigger--open]="isOpen"
        (click)="toggle($event)">
        <svg class="date-picker-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        <span class="date-picker-label">{{ value ? formatted : placeholder }}</span>
        <svg class="date-picker-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" [style.transform]="isOpen ? 'rotate(180deg)' : ''">
            <polyline points="6 9 12 15 18 9" />
        </svg>
    </button>

    @if (isOpen) {
    <div class="date-picker-panel" [style.top.px]="panelTop" [style.left.px]="panelLeft"
        (click)="$event.stopPropagation()">

        <div class="date-picker-head">
            <button type="button" class="date-picker-nav" (click)="prevMonth()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
            </button>
            <span class="date-picker-month-label">{{ MONTHS[viewMonth()] }} {{ viewYear() }}</span>
            <button type="button" class="date-picker-nav" (click)="nextMonth()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round">
                    <polyline points="9 18 15 12 9 6" />
                </svg>
            </button>
        </div>

        <div class="date-picker-weekdays">
            @for (wd of WEEKDAYS; track wd) {
            <span class="date-picker-wd">{{ wd }}</span>
            }
        </div>

        <div class="date-picker-grid">
            @for (day of calendarDays(); track $index) {
            @if (day) {
            <button type="button" class="date-picker-day" [class.date-picker-day--today]="isToday(day)"
                [class.date-picker-day--selected]="isSelected(day)" (click)="pick(day, $event)">{{ day }}</button>
            } @else {
            <span class="date-picker-day-empty"></span>
            }
            }
        </div>

    </div>
    }

</div>
