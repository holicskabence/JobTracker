<div class="search-toolbar-search-wrap">
  <svg class="search-toolbar-search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8" />
    <line x1="21" y1="21" x2="16.65" y2="16.65" />
  </svg>
  <input class="search-toolbar-search-input" type="text" [placeholder]="placeholder" [value]="value"
    (input)="onInput($event)" name="search" />
  @if (value) {
  <button class="search-toolbar-clear-button" (click)="onClear()" [title]="clearTitle">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
      stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18" />
      <line x1="6" y1="6" x2="18" y2="18" />
    </svg>
  </button>
  }
</div>
<span class="search-toolbar-count">{{ countLabel }}</span>
