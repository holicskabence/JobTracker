<div class="tp">

    <button type="button" class="time-picker-trigger" [class.time-picker-trigger--filled]="!!value"
        [class.time-picker-trigger--open]="isOpen" (click)="toggle($event)">
        <svg class="time-picker-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
        </svg>
        <span class="time-picker-label">{{ value ? formatted : placeholder }}</span>
        <svg class="time-picker-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" [style.transform]="isOpen ? 'rotate(180deg)' : ''">
            <polyline points="6 9 12 15 18 9" />
        </svg>
    </button>

    @if (isOpen) {
    <div class="time-picker-panel" [style.top]="openUpward ? null : panelTop + 'px'"
        [style.bottom]="openUpward ? panelBottom + 'px' : null" [style.left.px]="panelLeft"
        (click)="$event.stopPropagation()">

        <div class="time-picker-cols">

            <div class="time-picker-col">
                <div class="time-picker-col-head">Óra</div>
                <div class="time-picker-scroll" #hourList>
                    @for (h of hours; track h) {
                    <button type="button" class="time-picker-item" [class.time-picker-item--sel]="h === selectedHour"
                        (click)="pickHour(h, $event)">{{ h }}</button>
                    }
                </div>
            </div>

            <div class="time-picker-sep"></div>

            <div class="time-picker-col">
                <div class="time-picker-col-head">Perc</div>
                <div class="time-picker-mins">
                    @for (m of minutes; track m) {
                    <button type="button" class="time-picker-item" [class.time-picker-item--sel]="m === selectedMinute"
                        (click)="pickMinute(m, $event)">{{ m }}</button>
                    }
                </div>
            </div>

        </div>

        <div class="time-picker-footer">
            <button type="button" class="time-picker-clear" (click)="clear($event)">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
                Egész nap
            </button>
            @if (value) {
            <span class="time-picker-current">{{ value }}</span>
            }
        </div>

    </div>
    }

</div>
