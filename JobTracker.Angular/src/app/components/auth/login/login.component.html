<app-auth-card [title]="'auth.login.title' | translate" [subtitle]="'auth.login.subtitle' | translate">
        <app-language-switcher class="login-lang-switcher" variant="light" />
        <div class="oauth-btns">
            <button class="oauth-btn oauth-btn--google" type="button" (click)="googleLogin()" [disabled]="loading()">
                @if (loadingAction() === 'google') {
                <svg class="auth-spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                </svg>
                } @else {
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                {{ 'auth.login.googleBtn' | translate }}
                }
            </button>
            <button class="oauth-btn oauth-btn--facebook" type="button" (click)="facebookLogin()" [disabled]="loading()">
                @if (loadingAction() === 'facebook') {
                <svg class="auth-spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                </svg>
                } @else {
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
                    <path
                        d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                </svg>
                {{ 'auth.login.facebookBtn' | translate }}
                }
            </button>
            <div #googleBtn class="google-btn-hidden" aria-hidden="true"></div>
        </div>

        <div class="login-card-divider">
            <span>{{ 'auth.login.orEmailDivider' | translate }}</span>
        </div>

        <form class="login-card-form" (ngSubmit)="submit()">

            <div class="lf">
                <label class="auth-form-label">{{ 'auth.login.emailLabel' | translate }}</label>
                <div class="auth-form-wrap">
                    <svg class="auth-form-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                        <polyline points="22,6 12,13 2,6" />
                    </svg>
                    <input class="auth-form-input" type="email" [placeholder]="'auth.login.emailPlaceholder' | translate" autocomplete="email"
                        [(ngModel)]="email" name="email" required />
                </div>
            </div>

            <div class="lf">
                <label class="auth-form-label">{{ 'auth.login.passwordLabel' | translate }}</label>
                <div class="auth-form-wrap">
                    <svg class="auth-form-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    <input class="auth-form-input" [type]="showPwd ? 'text' : 'password'" placeholder="••••••••"
                        autocomplete="current-password" [(ngModel)]="password" name="password" required />
                    <button type="button" class="auth-form-eye" (click)="showPwd = !showPwd"
                        [title]="(showPwd ? 'auth.login.hidePassword' : 'auth.login.showPassword') | translate">
                        @if (showPwd) {
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                            <line x1="1" y1="1" x2="23" y2="23" />
                        </svg>
                        } @else {
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        }
                    </button>
                </div>
            </div>

            @if (error) {
            <p class="auth-form-error">{{ error }}</p>
            }

            <button class="login-card-btn login-card-btn--primary" type="submit" [disabled]="loading()">
                @if (loadingAction() === 'email') {
                <svg class="auth-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                </svg>
                } @else {
                {{ 'auth.login.submitBtn' | translate }}
                }
            </button>

        </form>

        <div class="login-card-divider">
            <span>{{ 'auth.login.orTryNowDivider' | translate }}</span>
        </div>

        <button class="login-card-btn login-card-btn--demo" type="button" (click)="loginDemo()" [disabled]="loading()">
            @if (loadingAction() === 'demo') {
            <svg class="auth-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 1 1-6.219-8.56" />
            </svg>
            } @else {
            {{ 'auth.login.demoBtn' | translate }}
            }
        </button>

        <p class="login-card-register">
            {{ 'auth.login.noAccountText' | translate }} <a routerLink="/register" class="login-card-link">{{ 'auth.login.registerLink' | translate }}</a>
        </p>

</app-auth-card>
