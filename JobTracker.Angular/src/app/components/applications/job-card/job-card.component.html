<app-card class="card" [class.card--selected]="isSelected" [class.card--dragging]="isDragging" draggable="true"
  (dragstart)="onDragStart($event)" (dragend)="onDragEnd()" (click)="onCardClick()">

  <div class="card-menu" (click)="$event.stopPropagation()">
    <app-status-dropdown [value]="job.status" (valueChange)="onStatusChange($event)" />
  </div>

  <h5 class="card-company">{{ job.company }}</h5>
  <p class="card-position">{{ job.position }}</p>

  <div class="card-footer">
    <div class="card-date">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
      {{ job.date }}
    </div>

    <div class="card-actions" (click)="$event.stopPropagation()">
      <!-- Edit button -->
      <button class="card-action-btn" [title]="'shared.jobCard.edit' | translate" (click)="onEditClick($event)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
      </button>

      @if (job.link) {
      <a class="card-action-btn" [href]="safeLink(job.link)" target="_blank" rel="noreferrer"
        [title]="'shared.jobCard.open' | translate" (click)="$event.stopPropagation()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
        </svg>
      </a>
      }
    </div>
  </div>

</app-card>
