<div class="kanban">
    <div class="kanban-scroll">
        @for (column of columns(); track column.key) {
        <app-kanban-column [status]="column.key" [label]="column.label" [color]="column.color" [jobs]="jobsFor(column.key)"
            [selectedIds]="selectedIds()" [isFiltering]="isFiltering()" (toggleSelect)="toggle($event)" (dropped)="onDrop($event)" />
        }
    </div>
    @if (hasSelection()) {
    <div class="bulk-bar">
        <span class="bulk-bar-count">
            <strong>{{ selectionCount() }}</strong> {{ 'kanban.selectedCount' | translate }}
        </span>

        <div class="bulk-bar-targets">
            @for (column of columns(); track column.key) {
            <button class="bulk-bar-target" (click)="moveTo(column.key)">
                <span class="bulk-bar-dot" [style.background-color]="column.color"></span>
                {{ column.label }}
            </button>
            }
        </div>
        <button class="bulk-bar-cancel" (click)="clearSelection()" [title]="'kanban.cancel' | translate">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        </button>
    </div>
    }
</div>
